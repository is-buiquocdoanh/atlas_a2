controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.2
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      # --- Giới hạn vận tốc ---
      min_vel_x: 0.0        # Vận tốc tiến tối thiểu (m/s) — tăng nếu không muốn robot đứng yên
      max_vel_x: 0.3        # Vận tốc tiến tối đa (m/s) — giảm nếu robot đi quá nhanh
      min_vel_y: 0.0        # Differential drive: không có chuyển động ngang
      max_vel_y: 0.0
      min_vel_theta: -0.5   # Vận tốc quay tối thiểu (rad/s)
      max_vel_theta: 0.5    # Vận tốc quay tối đa (rad/s) — giảm nếu robot quay giật cục
      min_speed_xy: 0.0     # Tốc độ tổng hợp tối thiểu (m/s)
      max_speed_xy: 0.3     # Tốc độ tổng hợp tối đa (m/s) — nên bằng max_vel_x
      min_speed_theta: 0.0  # Tốc độ quay tối thiểu (rad/s) — >0 ép robot luôn quay khi cần

      # --- Giới hạn gia tốc ---
      acc_lim_x: 1.0      # Gia tốc tiến tối đa (m/s²) — giảm nếu robot tăng tốc giật
      acc_lim_y: 0.0
      acc_lim_theta: 1.0    # Gia tốc góc tối đa (rad/s²) — giảm nếu robot quay giật
      decel_lim_x: -1.0     # Gia tốc hãm tiến (m/s²) — tăng tuyệt đối nếu robot phanh chậm
      decel_lim_theta: -2.0  # Gia tốc hãm góc (rad/s²)

      # --- Lấy mẫu quỹ đạo ---
      vx_samples: 20        # Số mẫu vận tốc tiến — tăng để tìm quỹ đạo tốt hơn nhưng tốn CPU
      vy_samples: 1         # Differential drive: để 1
      vtheta_samples: 20    # Số mẫu vận tốc quay — tăng nếu robot quay không mượt

      # --- Mô phỏng quỹ đạo ---
      sim_time: 1.5         # Thời gian nhìn trước (s) — tăng để robot lên kế hoạch xa hơn
      linear_granularity: 0.05   # Bước tịnh tiến khi mô phỏng (m) — giảm để kiểm tra va chạm kỹ hơn
      angular_granularity: 0.025 # Bước góc khi mô phỏng (rad)
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25    # Dung sai vị trí đến đích (m) — tăng nếu robot không chịu dừng
      trans_stopped_velocity: 0.25

      # --- Critics: hàm đánh giá từng quỹ đạo ---
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      BaseObstacle:
        scale: 0.02          # Phạt đi gần vật cản — tăng nếu robot hay cà vào đồ vật

      PathAlign:
        scale: 32.0          # Bám theo hướng của global path — tăng nếu robot hay cắt đường tắt tùy tiện
        forward_point_distance: 0.1

      GoalAlign:
        scale: 24.0          # Hướng đến mục tiêu — tăng nếu robot lệch hướng khi gần đích
        forward_point_distance: 0.1

      PathDist:
        scale: 32.0          # Giữ khoảng cách gần global path — tăng nếu robot bị lạc đường

      GoalDist:
        scale: 24.0          # Tiến đến đích — tăng nếu robot do dự không chịu tiến

      RotateToGoal:
        scale: 32.0          # Quay về hướng đích khi gần tới nơi — tăng nếu robot đến đích nhưng không xoay đúng
        slowing_factor: 5.0  # Giảm tốc khi xoay tại đích — tăng để phanh sớm hơn
        lookahead_time: -1.0 # -1 = dùng sim_time; >0 = chỉ nhìn trước N giây khi xoay

      Oscillation:
        scale: 1.0                   # Phạt dao động (tiến-lùi liên tục) — tăng nếu robot bị kẹt và rung tại chỗ
        oscillation_reset_dist: 0.05 # Di chuyển đủ xa này thì reset bộ đếm dao động (m)
        oscillation_reset_angle: 0.2 # Quay đủ góc này thì reset bộ đếm dao động (rad)

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 30.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[ [-0.45, -0.23], [-0.45, 0.23], [0.45, 0.23], [0.45, -0.23] ]"
      # robot_radius: 0.3
      plugins: ["obstacle_layer", "voxel_layer", "keepout_filter", "inflation_layer"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/keepout_filter_info"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.5
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /atlas/scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /atlas/scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0 # tầm xa xóa vết tích chướng ngại vật
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0 # tầm xa đánh dâu chướng ngại vật
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      footprint_padding: 0.03
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.3 # radius set and used, so no footprint points
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "voxel_layer", "keepout_filter", "speed_filter", "inflation_layer"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/keepout_filter_info"
      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: True
        filter_info_topic: "/speed_filter_info"
        speed_limit_topic: "/speed_limit"
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1
        scan:
          topic: /atlas/scan_filtered
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: false
      
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        unknown_threshold: 15
        mark_threshold: 0
        observation_sources: pointcloud
        combination_method: 1
        pointcloud:  # no frame set, uses frame from message
          topic: /intel_realsense_r200_depth/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
          transport_type: "raw"  # raw or/ with compression (zlib, draco, zstd)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.1
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.4
        cost_scaling_factor: 10.0
        inflate_unknown: false
        inflate_around_unknown: true
      always_send_full_costmap: True
      introspection_mode: "disabled"

map_server:
  ros__parameters:
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters: {}

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 2.0] # vx, vy, wz
    min_velocity: [-1.0, 0.0, -2.0] # vx, vy, wz
    max_accel: [4.0, 0.0, 4.0] # ax, ay, az
    max_decel: [-4.0, 0.0, -4.0] # ax, ay, az
    odom_topic: "/atlas/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
